<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert Clicker - Custom Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Layer 0: Unity WebGL Container -->
    <div id="unity-container">
        <!-- Unity WebGL canvas will be placed here -->
        <div class="unity-placeholder">
            <h1>Unity Background (Layer 0)</h1>
            <p>Interactive 3D space goes here.</p>
        </div>
    </div>

    <!-- Layer 1: Floating UI Wrapper (pointer-events: none) -->
    <div id="ui-wrapper">

        <!-- Left Navigation (Target Widgets) -->
        <div id="LeftNav">
            <button class="nav-btn" data-widget-target="Todolist" title="Todo List">📝</button>
            <button class="nav-btn" data-widget-target="MusicPlayer" title="Music Player">🎵</button>
            <button class="nav-btn" data-widget-target="Fomodoro" title="Fomodoro">⏳</button>
        </div>

        <!-- 1. Todolist Widget -->
        <div class="widget" id="Todolist">
            <div class="widget-header">
                <span class="title">Todo</span>
                <div>
                    <span class="add-todo-btn" title="Add Todo">[+]</span>
                    <span class="close-btn">&times;</span>
                </div>
            </div>
            <div class="widget-content">
                <div id="todo-list-container">
                    <div class="todo-item">
                        <input type="checkbox" id="todo1">
                        <span class="todo-label">Todo 1</span>
                        <span class="trash-btn">🗑</span>
                    </div>
                </div>
                <!-- Hidden by default -->
                <div class="add-todo-form" style="display: none;">
                    <input type="text" id="new-todo-input" placeholder="New task... (Enter to save)">
                </div>
            </div>
        </div>

        <!-- 2. Fomodoro Widget -->
        <div class="widget" id="Fomodoro">
            <div class="widget-header">
                <span class="title">Fomodoro</span>
                <span class="close-btn">&times;</span>
            </div>
            <div class="widget-content fomodoro-content">
                <div class="time-display-container">
                    <div class="time-display" title="Click to edit time">25:00</div>
                    <select class="time-select" style="display: none;">
                        <option value="5">05:00</option>
                        <option value="10">10:00</option>
                        <option value="15">15:00</option>
                        <option value="20">20:00</option>
                        <option value="25" selected>25:00</option>
                        <option value="30">30:00</option>
                        <option value="35">35:00</option>
                        <option value="40">40:00</option>
                        <option value="45">45:00</option>
                        <option value="50">50:00</option>
                    </select>
                </div>
                <div class="controls">
                    <button class="StartButton">Start</button>
                    <button class="StopButton">Stop</button>
                </div>
            </div>
        </div>

        <!-- 3. MusicPlayer Widget -->
        <div class="widget" id="MusicPlayer">
            <div class="widget-header">
                <span class="title">Music Player</span>
                <span class="close-btn">&times;</span>
            </div>
            <div class="widget-content player-content">
                <div class="url-input-row">
                    <input type="text" id="music-url-input" placeholder="YouTube or Spotify URL">
                    <button id="music-url-submit">Load</button>
                </div>
                <div id="MusicEmbedContainer">
                    <div class="music-placeholder">No Media Loaded</div>
                </div>
            </div>
        </div>

        <!-- 4. Shop Button (Bottom Right) -->
        <button id="ShopButton">Shop</button>

        <!-- 5. Shop Panel (Slide-in from right) -->
        <div id="ShopPanel">
            <div class="shop-header">
                <h2>Shop</h2>
            </div>

            <div class="tab-container">
                <div class="tab-buttons">
                    <button class="tab-btn active" data-target="UpgradePanel">강화</button>
                    <button class="tab-btn" data-target="DecoPanel">데코</button>
                </div>
                <!-- Sliding Indicator -->
                <div class="Indicator"></div>
            </div>

            <div class="tab-content-container">
                <!-- Upgrade Panel -->
                <div class="panel-content active" id="UpgradePanel">
                    <div class="Slot">
                        <div class="slot-icon"></div>
                        <div class="slot-info">Auto Clicker Lv.1</div>
                        <button class="buy-btn">100 G</button>
                    </div>
                    <div class="Slot">
                        <div class="slot-icon"></div>
                        <div class="slot-info">Cursor Power Lv.2</div>
                        <button class="buy-btn">500 G</button>
                    </div>
                </div>

                <!-- Deco Panel -->
                <div class="panel-content" id="DecoPanel">
                    <div class="Slot">
                        <div class="slot-icon deco-icon"></div>
                        <div class="slot-info">Pink Table</div>
                        <button class="buy-btn">1000 G</button>
                    </div>
                    <div class="Slot">
                        <div class="slot-icon deco-icon"></div>
                        <div class="slot-info">Neon Sign</div>
                        <button class="buy-btn">3000 G</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
